<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enable Microphone</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --panel: #181c26;
      --border: #2d3148;
      --text: #e4e6ef;
      --muted: #8b8fa7;
      --accent: #4f8ff7;
      --danger: #f77a7a;
      --success: #6be59a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(79, 143, 247, 0.22), transparent 40%),
        var(--bg);
      color: var(--text);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }

    main {
      width: min(520px, 100%);
      background: rgba(24, 28, 38, 0.94);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.1;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #73b2ff, #4f8ff7 55%, #3a62de);
      cursor: pointer;
      box-shadow: 0 14px 32px rgba(79, 143, 247, 0.22);
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
      box-shadow: none;
    }

    .status {
      min-height: 24px;
      margin-top: 16px;
      font-size: 14px;
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--success);
    }
  </style>
</head>
<body>
  <main>
    <h1>Enable The Microphone</h1>
    <p>Northstar needs one microphone grant from a normal Chrome tab. After this, the side panel can run Gemini Live voice directly.</p>
    <button id="enableButton" type="button">Enable Microphone</button>
    <div id="status" class="status" aria-live="polite"></div>
  </main>
  <script src="mic-permission.js" type="module"></script>
</body>
</html>
