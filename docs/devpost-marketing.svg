<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" font-family="'Avenir Next', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="55%" stop-color="#f5f8fd"/>
      <stop offset="100%" stop-color="#edf4fc"/>
    </linearGradient>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#d8e7ff"/>
    </linearGradient>
    <linearGradient id="panelMint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#effaf3"/>
      <stop offset="100%" stop-color="#dcf1e3"/>
    </linearGradient>
    <linearGradient id="panelWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7e4"/>
      <stop offset="100%" stop-color="#f5ead0"/>
    </linearGradient>
    <linearGradient id="brandBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c9fff"/>
      <stop offset="100%" stop-color="#4b7ef2"/>
    </linearGradient>
    <linearGradient id="brandGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3cbc6c"/>
      <stop offset="100%" stop-color="#279d53"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#53647d" flood-opacity="0.12"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#52627d" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1800" height="1200" fill="url(#bg)"/>
  <circle cx="190" cy="170" r="240" fill="#edf4ff"/>
  <circle cx="1500" cy="170" r="240" fill="#eef9f2"/>
  <circle cx="1230" cy="1030" r="290" fill="#eff5fd"/>
  <circle cx="420" cy="1020" r="210" fill="#eef5ff"/>

  <rect x="92" y="88" width="500" height="46" rx="23" fill="#ffffff" stroke="#d4e1f7" stroke-width="2"/>
  <circle cx="122" cy="111" r="8" fill="#4d83ef"/>
  <text x="144" y="118" fill="#49627f" font-size="20" font-weight="700" letter-spacing="1">GEMINI LIVE CONTROLLED BROWSING</text>

  <g transform="translate(92 172)">
    <rect x="0" y="0" width="84" height="84" rx="26" fill="#162434"/>
    <circle cx="42" cy="42" r="24" fill="#0d1824" stroke="#9fc7ff" stroke-width="4"/>
    <circle cx="42" cy="42" r="12" fill="#fbfcff"/>
    <circle cx="51" cy="33" r="4.5" fill="#9fc7ff"/>
    <path d="M42 11 L50 33 L73 42 L50 51 L42 73 L34 51 L11 42 L34 33 Z" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linejoin="round"/>
    <text x="112" y="48" fill="#172437" font-size="68" font-weight="700">Northstar</text>
    <text x="112" y="85" fill="#61718b" font-size="27" font-weight="600">Accessibility autopilot for the broken web.</text>
  </g>

  <text x="92" y="392" fill="#1a2537" font-size="74" font-weight="700">
    <tspan x="92" dy="0">Voice-guided</tspan>
    <tspan x="92" dy="78">browser control</tspan>
    <tspan x="92" dy="78">for hard-to-use sites.</tspan>
  </text>

  <text x="96" y="642" fill="#5a6b84" font-size="30" font-weight="500">
    <tspan x="96" dy="0">Built for anyone navigating the web.</tspan>
    <tspan x="96" dy="38">Especially useful when accessibility barriers</tspan>
    <tspan x="96" dy="38">break ordinary flows.</tspan>
  </text>

  <g transform="translate(96 752)">
    <rect x="0" y="0" width="188" height="54" rx="27" fill="#edf3ff" stroke="#ccddfb" stroke-width="2"/>
    <text x="94" y="36" text-anchor="middle" fill="#4272df" font-size="25" font-weight="700">Gemini Live</text>
    <rect x="208" y="0" width="224" height="54" rx="27" fill="#eef9f2" stroke="#cfead8" stroke-width="2"/>
    <text x="320" y="36" text-anchor="middle" fill="#279d53" font-size="25" font-weight="700">Verified actions</text>
    <rect x="456" y="0" width="270" height="54" rx="27" fill="#fff6e3" stroke="#ecd8ab" stroke-width="2"/>
    <text x="591" y="36" text-anchor="middle" fill="#9a6a13" font-size="25" font-weight="700">Accessibility-aware</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="920" y="118" width="790" height="640" rx="38" fill="#ffffff" stroke="#d9e2f2" stroke-width="3"/>
    <rect x="920" y="118" width="790" height="70" rx="38" fill="#f7fbff"/>
    <circle cx="968" cy="153" r="10" fill="#ff8d7b"/>
    <circle cx="1000" cy="153" r="10" fill="#f4c95f"/>
    <circle cx="1032" cy="153" r="10" fill="#49c96f"/>
    <rect x="1068" y="135" width="350" height="36" rx="18" fill="#edf3fb" stroke="#d8e2f3" stroke-width="2"/>
    <text x="1243" y="159" text-anchor="middle" fill="#72829a" font-size="18" font-weight="600">techmart.example</text>

    <rect x="952" y="214" width="480" height="506" rx="30" fill="url(#panelWarm)"/>
    <text x="996" y="268" fill="#172538" font-size="34" font-weight="700">TechMart</text>
    <text x="996" y="301" fill="#71829c" font-size="20">Broken product flow with weak semantics</text>

    <rect x="996" y="334" width="190" height="88" rx="24" fill="#ffffff" stroke="#efc9cb" stroke-width="3"/>
    <text x="1024" y="370" fill="#9d5058" font-size="21" font-weight="700">Price filter</text>
    <text x="1024" y="402" fill="#c46872" font-size="18">Input has no label</text>

    <rect x="1210" y="334" width="184" height="88" rx="24" fill="#ffffff" stroke="#d9e0ee" stroke-width="2"/>
    <text x="1238" y="370" fill="#4f6280" font-size="21" font-weight="700">Sort</text>
    <text x="1238" y="402" fill="#7d8ca3" font-size="18">Custom dropdown</text>

    <rect x="996" y="458" width="170" height="210" rx="28" fill="#ffffff" stroke="#ddd7ca" stroke-width="2"/>
    <rect x="1018" y="482" width="126" height="84" rx="20" fill="#d9e7ff"/>
    <text x="1081" y="603" text-anchor="middle" fill="#1b293b" font-size="24" font-weight="700">Speaker</text>
    <text x="1081" y="637" text-anchor="middle" fill="#677791" font-size="20">$39.99</text>

    <rect x="1188" y="458" width="170" height="210" rx="28" fill="#ffffff" stroke="#ddd7ca" stroke-width="2"/>
    <rect x="1210" y="482" width="126" height="84" rx="20" fill="#ffe4b7"/>
    <text x="1273" y="603" text-anchor="middle" fill="#1b293b" font-size="24" font-weight="700">Headphones</text>
    <text x="1273" y="637" text-anchor="middle" fill="#677791" font-size="20">$129.99</text>

    <rect x="1456" y="214" width="222" height="506" rx="30" fill="url(#panelBlue)" stroke="#cfe0fb" stroke-width="2"/>
    <rect x="1478" y="236" width="178" height="58" rx="22" fill="url(#brandBlue)"/>
    <text x="1567" y="274" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700">Northstar</text>

    <text x="1484" y="344" fill="#74839b" font-size="16" font-weight="700">YOU</text>
    <rect x="1480" y="356" width="174" height="76" rx="22" fill="#ffffff" stroke="#d7e3f7" stroke-width="2"/>
    <text x="1500" y="391" fill="#213047" font-size="21">
      <tspan x="1500" dy="0">Show items</tspan>
      <tspan x="1500" dy="25">under $50</tspan>
    </text>

    <text x="1484" y="478" fill="#4a77df" font-size="16" font-weight="700">NORTHSTAR</text>
    <rect x="1476" y="490" width="182" height="130" rx="22" fill="#ffffff" stroke="#d7e3f7" stroke-width="2"/>
    <text x="1496" y="526" fill="#213047" font-size="18.5">
      <tspan x="1500" dy="0">Using Gemini Live</tspan>
      <tspan x="1500" dy="24">to control the page</tspan>
      <tspan x="1500" dy="24">and verify the</tspan>
      <tspan x="1500" dy="24">result.</tspan>
    </text>

    <rect x="1480" y="646" width="174" height="66" rx="20" fill="#eef9f2" stroke="#cfead8" stroke-width="2"/>
    <text x="1567" y="674" text-anchor="middle" fill="#269c53" font-size="17" font-weight="700">
      <tspan x="1567" dy="0">Filter applied</tspan>
      <tspan x="1567" dy="22">Results updated</tspan>
    </text>
  </g>

  <g transform="translate(92 860)">
    <rect x="0" y="0" width="496" height="220" rx="34" fill="#ffffff" stroke="#d7e3f7" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="496" height="18" rx="34" fill="url(#brandBlue)"/>
    <text x="36" y="74" fill="#1a2a3d" font-size="36" font-weight="700">Gemini Live</text>
    <text x="36" y="118" fill="#62728c" font-size="24">
      <tspan x="36" dy="0">Real-time voice guidance</tspan>
      <tspan x="36" dy="32">for browser tasks.</tspan>
    </text>
  </g>

  <g transform="translate(652 860)">
    <rect x="0" y="0" width="496" height="220" rx="34" fill="#ffffff" stroke="#d6eadc" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="496" height="18" rx="34" fill="url(#brandGreen)"/>
    <text x="36" y="74" fill="#1a2a3d" font-size="36" font-weight="700">Controlled browsing</text>
    <text x="36" y="118" fill="#62728c" font-size="24">
      <tspan x="36" dy="0">Acts on the page, checks</tspan>
      <tspan x="36" dy="32">what changed, then continues.</tspan>
    </text>
  </g>

  <g transform="translate(1212 860)">
    <rect x="0" y="0" width="496" height="220" rx="34" fill="#ffffff" stroke="#eadcb8" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="496" height="18" rx="34" fill="#e4b84b"/>
    <text x="36" y="74" fill="#1a2a3d" font-size="36" font-weight="700">Accessibility focus</text>
    <text x="36" y="118" fill="#62728c" font-size="24">
      <tspan x="36" dy="0">Helps anyone browse, with</tspan>
      <tspan x="36" dy="32">special attention to broken UX.</tspan>
    </text>
  </g>
</svg>
